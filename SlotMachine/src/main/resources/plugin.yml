name: SlotMachine
version: 1.0.0
main: me.xthins.slotmachine.SlotMachinePlugin
api-version: '1.21'
author: xThins
website: https://github.com/
depend: [Vault]
softdepend: [DecentHolograms, SaberFactions, Factions]
commands:
  gamble:
    description: Open the slot machine GUI and subcommands.
    usage: /gamble [top|factions|stats|pot|history|reload|holo]
  happyhour:
    description: Control happy hour.
    usage: /happyhour <start|stop|status>
  gamblefix:
    description: Clear a stuck spin state.
    usage: /gamblefix <player>
permissions:
  slotmachine.use:
    default: true
  slotmachine.admin:
    default: op
