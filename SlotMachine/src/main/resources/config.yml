prefix: "&8[&dSlotMachine&8]&r"

economy:
  currency-symbol: "$"
  use-short-format-in-gui: true

bets:
  small:
    key: small
    display-name: "&a&lStreet Sip"
    material: SLIME_BALL
    cost: 250000
    min-multiplier: 1.4
    max-multiplier: 2.2
    gui-slot: 37
    win-chance: 0.38
  medium:
    key: medium
    display-name: "&6&lVintage Toss"
    material: GOLD_INGOT
    cost: 1000000
    min-multiplier: 2.0
    max-multiplier: 7.0
    gui-slot: 40
    win-chance: 0.28
  big:
    key: big
    display-name: "&c&lHigh Roller Reserve"
    material: DIAMOND
    cost: 10000000
    min-multiplier: 5.0
    max-multiplier: 25.0
    gui-slot: 43
    win-chance: 0.18

jackpot:
  base-pot: 10000000
  chance-percent: 0.35
  contribution-percent: 25.0
  big-win-threshold: 1000000
  milestone-broadcasts:
    - 20000000
    - 50000000
    - 100000000

happy-hour:
  enabled: true
  multiplier: 2.0
  duration-minutes: 5
  interval-minutes: 60
  double-jackpot-chance: true

spin:
  gui-title: "&d&lSLOT MACHINE &8- &7Center line pays"
  ticks-normal: 24
  jackpot-extra-slow-ticks: 10
  tick-speed-normal: 2
  tick-speed-slow: 5
  flash-cycles: 4
  bedrock-timeout-seconds: 20

reels:
  top-row-slots: [11, 12, 13]
  middle-row-slots: [20, 21, 22]
  bottom-row-slots: [29, 30, 31]
  payline-slots: [19, 23]

holograms:
  enabled: true
  update-seconds: 60
  winners-id: "slotmachine_winners"
  factions-id: "slotmachine_factions"
  winners-title: "&d&lTop Winners"
  factions-title: "&6&lTop Gambling Factions"

sounds:
  reel-click: "UI_BUTTON_CLICK"
  spin-win: "ENTITY_PLAYER_LEVELUP"
  spin-lose: "ENTITY_ITEM_BREAK"
  jackpot: "ENTITY_LIGHTNING_BOLT_THUNDER"
  happy-hour: "ENTITY_PLAYER_LEVELUP"
